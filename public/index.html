<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Engine – Create Shorts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #e8e8ed;
      --muted: #8b8b9a;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
    }
    label .req { color: var(--accent); }
    input, textarea, select {
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    input::placeholder, textarea::placeholder {
      color: var(--muted);
      opacity: 0.7;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .row .field { flex: 1; min-width: 140px; }
    .checkbox-field {
      flex-direction: row;
      align-items: center;
      gap: 0.6rem;
    }
    .checkbox-field input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .checkbox-field label { margin-bottom: 0; cursor: pointer; }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-top: 0.5rem;
      margin-bottom: -0.5rem;
    }
    button[type="submit"] {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 1rem 1.5rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    button[type="submit"]:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #result {
      margin-top: 2rem;
      padding: 1.25rem;
      border-radius: 8px;
      display: none;
    }
    #result.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    #result.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    #result h3 {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      color: var(--success);
    }
    #result.error h3 { color: var(--error); }
    #result p, #result a {
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      word-break: break-all;
    }
    #result a {
      color: var(--accent);
      text-decoration: none;
    }
    #result a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .custom-input { margin-top: 0.5rem; }
    .custom-input.hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Content Engine</h1>
      <p class="subtitle">Create 15-second Shorts with AI voice, images & music</p>
    </header>

    <form id="form">
      <div class="field">
        <label for="topicSelect">Topic <span class="req">*</span></label>
        <select id="topicSelect" name="topicSelect">
          <option value="">— Choose or type custom —</option>
          <option value="world famous quotation">World famous quotation</option>
          <option value="morning motivation">Morning motivation</option>
          <option value="success mindset">Success mindset</option>
          <option value="inspirational quotes">Inspirational quotes</option>
          <option value="daily wisdom">Daily wisdom</option>
          <option value="entrepreneur motivation">Entrepreneur motivation</option>
          <option value="life lessons">Life lessons</option>
          <option value="positive affirmations">Positive affirmations</option>
          <option value="custom">Custom...</option>
        </select>
        <div id="topicCustomWrap" class="custom-input hidden">
          <input type="text" id="topic" name="topic" placeholder="e.g. AI trends, skincare tips">
        </div>
        <span class="hint">What should the video be about? (Required if no script)</span>
      </div>

      <div class="field">
        <label for="script">Script (optional)</label>
        <textarea id="script" name="script" placeholder="Leave empty to auto-generate from topic. Or paste your own script here."></textarea>
      </div>

      <span class="section-title">Customize</span>

      <div class="field">
        <label for="hook">Hook text</label>
        <input type="text" id="hook" name="hook" placeholder="e.g. STOP SCROLLING (auto-derived if empty)">
        <span class="hint">Shown for first 3.5s – helps YouTube pick it for thumbnail</span>
      </div>

      <div class="field">
        <label for="imageQuerySelect">Image search keywords</label>
        <select id="imageQuerySelect" name="imageQuerySelect">
          <option value="">Use topic (default)</option>
          <option value="inspiration motivation">Inspiration motivation</option>
          <option value="nature landscape">Nature landscape</option>
          <option value="success achievement">Success achievement</option>
          <option value="calm peaceful">Calm peaceful</option>
          <option value="urban lifestyle">Urban lifestyle</option>
          <option value="minimalist aesthetic">Minimalist aesthetic</option>
          <option value="custom">Custom...</option>
        </select>
        <div id="imageQueryCustomWrap" class="custom-input hidden">
          <input type="text" id="imageQuery" name="imageQuery" placeholder="e.g. tropical beach sunset">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="imageCount">Images</label>
          <select id="imageCount" name="imageCount">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="field">
          <label for="maxWords">Script length</label>
          <select id="maxWords" name="maxWords">
            <option value="35" selected>~15 sec (35 words)</option>
            <option value="50">~20 sec (50 words)</option>
          </select>
        </div>
      </div>

      <div class="field checkbox-field">
        <input type="checkbox" id="showQuote" name="showQuote" checked>
        <label for="showQuote">Show quote overlay on video</label>
      </div>

      <div class="field checkbox-field">
        <input type="checkbox" id="addMusic" name="addMusic" checked>
        <label for="addMusic">Add background music</label>
      </div>

      <div class="field">
        <label for="musicQuerySelect">Music theme</label>
        <select id="musicQuerySelect" name="musicQuerySelect">
          <option value="">Default</option>
          <option value="calm">Calm</option>
          <option value="motivation">Motivation</option>
          <option value="uplifting">Uplifting</option>
          <option value="peaceful">Peaceful</option>
          <option value="energy">Energy</option>
          <option value="inspirational">Inspirational</option>
          <option value="custom">Custom...</option>
        </select>
        <div id="musicQueryCustomWrap" class="custom-input hidden">
          <input type="text" id="musicQuery" name="musicQuery" placeholder="e.g. cinematic, ambient">
        </div>
      </div>

      <div class="field">
        <label for="title">YouTube title</label>
        <input type="text" id="title" name="title" placeholder="Default: topic + #Shorts">
      </div>

      <button type="submit" id="submitBtn">
        Generate Video
      </button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const resultEl = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    // Toggle custom inputs when "Custom" or empty is selected
    function setupSelectWithCustom(selectId, customWrapId, showWhenEmpty) {
      const sel = document.getElementById(selectId);
      const wrap = document.getElementById(customWrapId);
      const update = () => {
        const show = sel.value === 'custom' || (showWhenEmpty && !sel.value);
        wrap.classList.toggle('hidden', !show);
        if (!show) wrap.querySelector('input').value = '';
      };
      sel.addEventListener('change', update);
      update();
    }
    setupSelectWithCustom('topicSelect', 'topicCustomWrap', true);  // show custom when placeholder
    setupSelectWithCustom('imageQuerySelect', 'imageQueryCustomWrap', false);
    setupSelectWithCustom('musicQuerySelect', 'musicQueryCustomWrap', false);

    function getTopic() {
      const sel = document.getElementById('topicSelect');
      if (sel.value && sel.value !== 'custom') return sel.value.trim();
      return document.getElementById('topic').value.trim();
    }
    function getImageQuery() {
      const sel = document.getElementById('imageQuerySelect');
      if (sel.value === 'custom') return document.getElementById('imageQuery').value.trim();
      return sel.value ? sel.value.trim() : '';
    }
    function getMusicQuery() {
      const sel = document.getElementById('musicQuerySelect');
      if (sel.value === 'custom') return document.getElementById('musicQuery').value.trim();
      return sel.value ? sel.value.trim() : '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = getTopic();
      const script = document.getElementById('script').value.trim();
      if (!topic && !script) {
        showResult('error', 'Please choose a topic, enter a custom topic, or paste a script.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Generating... (1–2 min)';
      resultEl.className = '';
      resultEl.style.display = 'none';

      const body = {
        topic: topic || undefined,
        script: script || undefined,
        hook: document.getElementById('hook').value.trim() || undefined,
        imageQuery: getImageQuery() || undefined,
        imageCount: parseInt(document.getElementById('imageCount').value, 10),
        maxWords: parseInt(document.getElementById('maxWords').value, 10),
        showQuote: document.getElementById('showQuote').checked,
        addMusic: document.getElementById('addMusic').checked,
        musicQuery: getMusicQuery() || undefined,
        title: document.getElementById('title').value.trim() || undefined,
      };

      try {
        const res = await fetch('/api/generate-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || `Error ${res.status}`);
        }

        let html = '<h3>Video created!</h3>';
        if (data.videoUrl) {
          html += `<p><a href="${data.videoUrl}" target="_blank" rel="noopener">Watch video</a></p>`;
        }
        if (data.youtubeUrl) {
          html += `<p><a href="${data.youtubeUrl}" target="_blank" rel="noopener">View on YouTube</a></p>`;
        }
        if (data.videoPath && !data.videoUrl) {
          html += `<p>Saved locally: ${data.videoPath}</p>`;
        }
        showResult('success', html);
      } catch (err) {
        showResult('error', err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate Video';
      }
    });

    function showResult(type, content) {
      resultEl.className = type;
      resultEl.innerHTML = typeof content === 'string' && content.startsWith('<') ? content : `<p>${content}</p>`;
      resultEl.style.display = 'block';
    }
  </script>
</body>
</html>
